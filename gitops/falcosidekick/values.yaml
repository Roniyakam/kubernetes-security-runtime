# Falcosidekick config — nested under `falcosidekick:` because it is a
# bundled subchart of falcosecurity/falco (see ../falco/values.yaml),
# not a standalone Helm release. Merged as an additional valueFile into
# the same "falco" release (see gitops/falco/application.yaml).
#
# falco.http_output is auto-wired by the falco chart's
# falco.falcosidekickConfig helper to http://<falco fullname>-falcosidekick
# (here: http://falco-falcosidekick, per ../falco/values.yaml's
# fullnameOverride: "falco"). That helper does NOT read this subchart's own
# values, so the subchart's Service must be pinned to the same name below —
# otherwise it defaults to `<release-name>-falcosidekick`
# (kubernetes-security-runtime-falcosidekick) and every Falco event fails
# to reach it (silent DNS failure, no error logged by either side).
falcosidekick:
  fullnameOverride: "falco-falcosidekick"

  replicaCount: 1

  service:
    type: ClusterIP
    port: 2801

  config:
    loki:
      # vm-monitoring, outside the K3s cluster (Docker Compose stack —
      # see devops-saas-platform/ansible/roles/monitoring). Reused
      # as-is, no second Loki instance deployed for this project.
      # Real IP committed here is a deliberate S1 trade-off for this
      # portfolio cluster (UFW on vm-monitoring only accepts traffic
      # from vm-k8s-master/vm-k8s-worker on :3100 either way) — see
      # docs/known-issues.md for the follow-up (internal DNS / K8s
      # ExternalName Service) planned before this pattern is reused
      # on non-portfolio infrastructure.
      hostport: "http://51.15.199.56:3100"
      # Grafana Explore query for validation: {source="syscall"} — NOT
      # {job="falco"}. Falcosidekick's Loki output does not set a "job"
      # label by default; its built-in labels are rule/source/priority
      # (see docs/known-issues.md for the corrected validation query).
      format: "json"

    webhook:
      # S2: webhook/app.py deployed as gitops/webhook/{deployment,service}.yaml
      # (Service "falco-webhook", namespace falco). customHeaders is
      # deliberately absent here (it's a plain string field in this chart's
      # values.yaml — see docs/known-issues.md — no secretKeyRef equivalent)
      # and supplied instead at runtime via the WEBHOOK_CUSTOMHEADERS env var
      # (extraEnv below), which the falcosidekick binary itself prefers over
      # this yaml value. Never a plain-text token in this repo.
      address: "http://falco-webhook.falco.svc.cluster.local:8080/webhook"

    # Decision 3 (docs/cadrage-s2-webhook-response.md): shared bearer token,
    # sourced from the same Vault-backed Secret as the webhook Deployment
    # itself (gitops/webhook/deployment.yaml), never committed in clear
    # here. Nested under `config:` — that's the path the chart's
    # deployment.yaml template actually reads (.Values.config.extraEnv),
    # verified with `helm template` against this chart version.
    extraEnv:
      - name: WEBHOOK_CUSTOMHEADERS
        valueFrom:
          secretKeyRef:
            name: webhook-token
            key: customheaders

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
