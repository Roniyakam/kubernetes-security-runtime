apiVersion: v1
kind: Service
metadata:
  # Name relied upon by gitops/falcosidekick/values.yaml's webhook.address
  # (http://falco-webhook.falco.svc.cluster.local:8080/webhook) -- keep in
  # sync if renamed. ClusterIP only: /webhook and /release perform real
  # pod isolation, gated on a bearer token -- they never need to be, and
  # never are, reachable from outside the cluster network.
  name: falco-webhook
  namespace: falco
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: webhook
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  # Separate from falco-webhook on purpose: this is the only piece of the
  # webhook NodePort-exposed, and it can only ever serve /metrics -- the
  # container's port 9090 is prometheus_client's own standalone server
  # (webhook/app.py main()), which doesn't route to /webhook or /release at
  # all. vm-monitoring's Prometheus (outside the K3s cluster, separate
  # Docker Compose network -- see docs/known-issues.md) has no route to
  # ClusterIP Services or *.svc.cluster.local, so NodePort is the only way
  # for it to reach this. nodePort pinned (not auto-assigned) so
  # devops-saas-platform's prometheus.yml.j2 has a stable target.
  name: webhook-metrics
  namespace: falco
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: webhook
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090
